name: Add Score

on:
  repository_dispatch:
    types: [add_score]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update scores
        run: |
          python3 - <<'EOF'
          import json, os, datetime

          name  = os.environ["PLAYER_NAME"]
          score = int(os.environ["PLAYER_SCORE"])
          date  = datetime.datetime.utcnow().strftime("%Y-%m-%d")

          with open("scores.json", "r") as f:
              scores = json.load(f)

          scores = [s for s in scores if s.get("name") != name]
          scores.append({"name": name, "score": score, "date": date})
          scores.sort(key=lambda x: x["score"], reverse=True)
          scores = scores[:100]

          with open("scores.json", "w") as f:
              json.dump(scores, f, ensure_ascii=False, indent=2)
          EOF
        env:
          PLAYER_NAME:  ${{ github.event.client_payload.name }}
          PLAYER_SCORE: ${{ github.event.client_payload.score }}

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json
          git diff --staged --quiet || git commit -m "score: ${{ github.event.client_payload.name }} → ${{ github.event.client_payload.score }}"
          git push
